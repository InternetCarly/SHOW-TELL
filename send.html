<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Send Image</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      color: #fff;
      font-family: sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      gap: 20px;
    }
    #status {
      font-size: 14px;
      opacity: 0.7;
    }
    #status.connected { color: #4f4; }
    #status.disconnected { color: #f44; }
    #preview {
      max-width: 80vw;
      max-height: 40vh;
      border-radius: 8px;
      display: none;
    }
    button, label {
      background: #4361ee;
      color: #fff;
      border: none;
      padding: 16px 32px;
      border-radius: 12px;
      font-size: 18px;
      cursor: pointer;
      text-align: center;
    }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    label { display: inline-block; }
    input[type="file"] { display: none; }
    #feedback { font-size: 16px; min-height: 24px; }
  </style>
</head>
<body>
  <div id="status" class="disconnected">connecting...</div>

  <label for="filePicker">Choose / Take Photo</label>
  <input type="file" id="filePicker" accept="image/*">

<img id="preview" alt="Preview">
<div id="formWrapper" style="display: none; flex-direction: column; align-items: center; gap: 12px; width: 80vw;">
  <input type="text" id="description" placeholder="Tell us about your image!" style="width: 100%; padding: 12px; border-radius: 8px; border: none; font-size: 16px;">
  <input type="text" id="name" placeholder="Your Name (optional)" style="width: 100%; padding: 12px; border-radius: 8px; border: none; font-size: 16px;">
  <button id="sendBtn" >Send to Display</button>
</div>
<div id="feedback"></div>

  <script>
    const params = new URLSearchParams(location.search);
    const room = params.get("room") || "default";
    const DEFAULT_SERVER = (location.protocol === "https:" ? "wss:" : "ws:") + "//" + location.host;
    const SERVER = params.get("server") || DEFAULT_SERVER;
    const MAX_WIDTH = 720;

    const statusEl = document.getElementById("status");
    const filePicker = document.getElementById("filePicker");
    const preview = document.getElementById("preview");
    const inputContainer = document.getElementById("formWrapper");
    const descriptionEl = document.getElementById("description");
    const nameEl = document.getElementById("name");
    const sendBtn = document.getElementById("sendBtn");
    const feedback = document.getElementById("feedback");

    let ws = null;
    let imageData = null;

    function connect() {
      ws = new WebSocket(`${SERVER}?room=${room}&role=sender`);

      ws.onopen = () => {
        statusEl.textContent = `connected (room: ${room})`;
        statusEl.className = "connected";
        updateSendButton();
      };

      ws.onclose = () => {
        statusEl.textContent = "disconnected — reconnecting...";
        statusEl.className = "disconnected";
        sendBtn.disabled = true;
        setTimeout(connect, 2000);
      };

      ws.onerror = () => ws.close();
    }

    // Resize image on a canvas to keep file sizes reasonable
    function resizeImage(file) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          let { width, height } = img;
          if (width > MAX_WIDTH) {
            height = Math.round(height * (MAX_WIDTH / width));
            width = MAX_WIDTH;
          }
          const canvas = document.createElement("canvas");
          canvas.width = width;
          canvas.height = height;
          canvas.getContext("2d").drawImage(img, 0, 0, width, height);
          let dataUrl = canvas.toDataURL("image/jpeg", 0.4);
          if (!dataUrl.startsWith('data:')) {
            dataUrl = `data:image/jpeg;base64,${dataUrl}`;
          }
          resolve(dataUrl);
        };
        img.src = URL.createObjectURL(file);
      });
    }

    filePicker.addEventListener("change", async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      feedback.textContent = "Resizing...";
      imageData = await resizeImage(file);
      preview.src = imageData;
      preview.style.display = "block";
      inputContainer.style.display = "flex";
      descriptionEl.value = ''; // Clear description for new image
      feedback.textContent = `Ready (${(imageData.length / 1024).toFixed(0)} KB)`;

      updateSendButton();
    });

    // Enable/disable send button based on description
    descriptionEl.addEventListener("input", updateSendButton);

    function updateSendButton() {
      sendBtn.disabled = !imageData || !descriptionEl.value.trim() || (ws && ws.readyState !== 1);
    }

    sendBtn.addEventListener("click", () => {
      if (!imageData || !descriptionEl.value.trim() || !ws || ws.readyState !== 1) return;
      const message = {
        image: imageData,
        description: descriptionEl.value.trim(),
        name: nameEl.value.trim() || null
      };
      ws.send(JSON.stringify(message));
      feedback.textContent = "Sent!";
      sendBtn.disabled = true;
      setTimeout(() => { updateSendButton(); }, 1000);
    });

    connect();
  </script>
</body>
</html>
