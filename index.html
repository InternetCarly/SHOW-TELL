<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Display</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      color: #fff;
      font-family: Consolas, monospace;
      height: 100vh;
      overflow: auto;
      padding: 16px;
    }
    #status {
      position: fixed;
      top: 16px;
      left: 16px;
      font-size: 14px;
      opacity: 0.6;
      z-index: 10;
    }
    #status.connected { color: #4f4; }
    #status.disconnected { color: #f44; }
    #waiting {
      font-size: 24px;
      opacity: 0.4;
      text-align: center;
      margin-top: 50vh;
    }
    #images {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
      padding-top: 40px;
    }
    .image-item {
      width: 100%;
      height: auto;
      object-fit: cover;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
      cursor: pointer;
    }
    #fullscreen {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: 60px 16px 24px;
      gap: 12px;
      z-index: 20;
    }
    #fullscreen img {
      flex: 0 1 auto;
      min-height: 60px;
      max-width: 90vw;
      max-height: 80vh;
      object-fit: contain;
      border-radius: 12px;
      box-shadow: 0 0 24px rgba(0,0,0,0.8);
    }
    #fullscreen .meta {
      flex: 0 0 auto;
      color: #fff;
      text-align: center;
      max-width: 90vw;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .meta-desc {
      font-size: 16px;
      line-height: 1.4;
    }
    .meta-name {
      font-size: 14px;
      opacity: 0.65;
    }
    #fullscreen .nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.4);
      border: none;
      color: #fff;
      font-size: 36px;
      padding: 12px 16px;
      cursor: pointer;
      border-radius: 8px;
      user-select: none;
    }
    #fullscreen .nav:hover {
      background: rgba(255,255,255,0.2);
    }
    #fullscreen .nav.prev { left: 16px; }
    #fullscreen .nav.next { right: 16px; }
    #fullscreen .close {
      position: absolute;
      bottom: 16px;
      right: 16px;
      background: rgba(0,0,0,0.5);
      border: none;
      color: #fff;
      font-size: 24px;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
    }
        #qr-container {
      position: fixed;
      bottom: 16px;
      right: 16px;
      background: rgba(0,0,0,0.8);
      padding: 8px;
      border-radius: 8px;
      z-index: 10;
    }
    #qr-container canvas {
      display: block;
    }

    #imageCount {
      position: fixed;
      top: 16px;
      right: 72px;
      font-size: 13px;
      opacity: 0.5;
      color: #fff;
      z-index: 10;
      font-family: Consolas, monospace;
    }
    #clearWrapper {
      position: fixed;
      top: 0;
      right: 0;
      width: 60px;
      height: 60px;
      z-index: 30;
    }
    #clearBtn {
      position: absolute;
      top: 0;
      right: 0;
      width: 50px;
      height: 50px;
      background: #c00;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 11px;
      padding: 4px;
      opacity: 0;
      transform: translate(24px, -24px) scale(0);
      transition: transform 0.1s ease, opacity 0.2s ease;
      text-align: center;
      line-height: 1.2;
    }
    #clearWrapper:hover #clearBtn {
      opacity: 1;
      transform: translate(0, 0) scale(1);
    }

    #confirmOverlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    #confirmOverlay.visible {
      display: flex;
    }
    #confirmBox {
      background: #1e1e1e;
      border-radius: 16px;
      padding: 32px 36px;
      max-width: 360px;
      width: 90%;
      text-align: center;
      box-shadow: 0 8px 40px rgba(0,0,0,0.8);
    }
    #confirmBox p {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    #confirmBox .sub {
      font-size: 13px;
      opacity: 0.5;
      margin-bottom: 28px;
      font-weight: normal;
    }
    #confirmBox .confirm-btns {
      display: flex;
      gap: 12px;
      justify-content: center;
    }
    #confirmBox button {
      flex: 1;
      padding: 12px 16px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: Consolas, monospace;
    }
    #confirmYes {
      background: #2a0000;
      color: #ff4444;
    }
    #confirmYes:hover {
      background: #3d0000;
    }
    #confirmNo {
      background: #2e2e2e;
      color: #999;
    }
    #confirmNo:hover {
      background: #3a3a3a;
    }

  </style>
</head>
<body>
  <div id="status" class="disconnected">disconnected</div>
  <div id="imageCount">0/50</div>
  <div id="clearWrapper" aria-label="Clear all images">
    <button id="clearBtn">CLEAR ALL IMAGES</button>
  </div>
  <div id="waiting">Waiting for images...</div>
  <div id="images"></div>

  <div id="confirmOverlay">
    <div id="confirmBox">
      <p>Clear all images?</p>
      <p class="sub">This can't be undone.</p>
      <div class="confirm-btns">
        <button id="confirmNo">Fuck, go back</button>
        <button id="confirmYes">Yes, Nuke em'</button>
      </div>
    </div>
  </div>

  <div id="fullscreen">
    <button class="close" aria-label="Close">CLOSE</button>
    <button class="nav prev" aria-label="Previous">‹</button>
    <img id="fullscreenImage" alt="Fullscreen image">
    <div class="meta" id="fullscreenMeta"></div>
    <button class="nav next" aria-label="Next">›</button>
  </div>
  <div id="qr-container"></div>

  <script>
    const params = new URLSearchParams(location.search);
    const room = params.get("room") || "default";

    // Default to the same host/port as the page (works for local hosting).
    const DEFAULT_SERVER = (location.protocol === "https:" ? "wss:" : "ws:") + "//" + location.host;
    const SERVER = params.get("server") || DEFAULT_SERVER;

    const statusEl = document.getElementById("status");
    const waitingEl = document.getElementById("waiting");
    const imagesEl = document.getElementById("images");
    const imageCountEl = document.getElementById("imageCount");
    const qrContainer = document.getElementById("qr-container");
    const fullscreen = document.getElementById("fullscreen");
    const fullscreenImage = document.getElementById("fullscreenImage");
    const fullscreenMeta = document.getElementById("fullscreenMeta");
    const prevBtn = document.querySelector("#fullscreen .nav.prev");
    const nextBtn = document.querySelector("#fullscreen .nav.next");
    const closeBtn = document.querySelector("#fullscreen .close");
    const clearBtn = document.getElementById("clearBtn");

    let ws = null;

        // Generate QR code for send page
    const sendUrl = `${location.protocol}//${location.host}/send.html?server=${SERVER}&room=${room}`;
    console.log('Generating QR for:', sendUrl);
    try {
      new QRCode(qrContainer, {
        text: sendUrl,
        width: 128,
        height: 128,
        colorDark: "#000000",
        colorLight: "#ffffff",
        correctLevel: QRCode.CorrectLevel.H
      });
      console.log('QR code generated successfully');
    } catch (error) {
      console.error('QR code generation failed:', error);
    }

    let images = [];
    let metadata = [];
    let currentIndex = 0;
    let rotateTimer = null;
    let clearPending = false;

    function renderImages() {
      imageCountEl.textContent = `${images.length}/50`;
      imagesEl.innerHTML = '';
      if (images.length === 0) {
        waitingEl.style.display = "block";
      } else {
        waitingEl.style.display = "none";
        images.forEach((imgSrc, idx) => {
          const img = document.createElement('img');
          img.className = 'image-item';
          img.alt = 'Received image';
          img.src = imgSrc;
          img.addEventListener('click', () => showFullscreen(idx));
          imagesEl.appendChild(img);
        });
      }
    }

    function showFullscreen(index) {
      if (images.length === 0) return;
      if (index < 0) index = images.length - 1;
      if (index >= images.length) index = 0;
      currentIndex = index;
      fullscreenImage.src = images[currentIndex];
      const meta = metadata[currentIndex] || {};
      const desc = meta.description || '';
      const name = meta.name ? `submitted by ${meta.name}` : '';
      fullscreenMeta.innerHTML = '';
      if (desc) {
        const d = document.createElement('span');
        d.className = 'meta-desc';
        d.textContent = desc;
        fullscreenMeta.appendChild(d);
      }
      if (name) {
        const n = document.createElement('span');
        n.className = 'meta-name';
        n.textContent = name;
        fullscreenMeta.appendChild(n);
      }
      fullscreen.style.display = 'flex';
      document.getElementById('clearWrapper').style.display = 'none';
      resetRotateTimer();
    }

    function hideFullscreen() {
      fullscreen.style.display = 'none';
      document.getElementById('clearWrapper').style.display = 'block';
      clearRotateTimer();
    }

    function clearRotateTimer() {
      if (rotateTimer) {
        clearInterval(rotateTimer);
        rotateTimer = null;
      }
    }

    function resetRotateTimer() {
      clearRotateTimer();
      rotateTimer = setInterval(() => {
        showFullscreen(currentIndex + 1);
      }, 5000); //timer length
    }

    function connect() {
      if (ws && ws.readyState === 1) ws.close();
      ws = new WebSocket(`${SERVER}?room=${room}&role=display`);

      ws.onopen = () => {
        statusEl.textContent = `connected!`;
        statusEl.className = "connected";
        if (clearPending) {
          // Reconnected with a pending clear — re-send so server confirms and resets the flag
          ws.send(JSON.stringify({ clear: true }));
        }
      };

      ws.onmessage = (e) => {
        try {
          const data = JSON.parse(e.data);
          // New format: { images: [...], metadata: [...] }
          if (data && Array.isArray(data.images)) {
            if (clearPending && data.images.length > 0) {
              // Stale broadcast arrived after a clear — re-send clear and discard
              if (ws && ws.readyState === 1) ws.send(JSON.stringify({ clear: true }));
              return;
            }
            if (data.images.length === 0) clearPending = false;
            images = data.images;
            metadata = Array.isArray(data.metadata) ? data.metadata : [];
          } else if (Array.isArray(data)) {
            // Backwards compat: old format was just an array of image URLs
            if (clearPending && data.length > 0) return;
            images = data;
          }
          renderImages();
        } catch (err) {
          console.error('Failed to parse images:', err);
        }
      };

      ws.onclose = () => {
        statusEl.textContent = "disconnected — reconnecting...";
        statusEl.className = "disconnected";
        setTimeout(connect, 2000);
      };

      ws.onerror = () => ws.close();
    }

    prevBtn.addEventListener('click', () => {
      showFullscreen(currentIndex - 1);
    });

    nextBtn.addEventListener('click', () => {
      showFullscreen(currentIndex + 1);
    });

    document.addEventListener('keydown', (e) => {
      if (fullscreen.style.display !== 'flex') return;
      if (e.key === 'ArrowLeft') showFullscreen(currentIndex - 1);
      if (e.key === 'ArrowRight') showFullscreen(currentIndex + 1);
    });

    closeBtn.addEventListener('click', hideFullscreen);

    fullscreen.addEventListener('click', (e) => {
      if (e.target === fullscreen) hideFullscreen();
    });

    function clearAllImages() {
      clearPending = true;
      images = [];
      metadata = [];
      renderImages();
      hideFullscreen();
      if (ws && ws.readyState === 1) {
        ws.send(JSON.stringify({ clear: true }));
      }
    }

    const confirmOverlay = document.getElementById('confirmOverlay');
    const confirmYes = document.getElementById('confirmYes');
    const confirmNo = document.getElementById('confirmNo');

    clearBtn.addEventListener('click', () => {
      confirmOverlay.classList.add('visible');
    });

    confirmYes.addEventListener('click', () => {
      confirmOverlay.classList.remove('visible');
      clearAllImages();
    });

    confirmNo.addEventListener('click', () => {
      confirmOverlay.classList.remove('visible');
    });

    connect();
  </script>
</body>
</html>
