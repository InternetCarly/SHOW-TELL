<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Display</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      color: #fff;
      font-family: sans-serif;
      height: 100vh;
      overflow: auto;
      padding: 16px;
    }
    #status {
      position: fixed;
      top: 16px;
      left: 16px;
      font-size: 14px;
      opacity: 0.6;
      z-index: 10;
    }
    #status.connected { color: #4f4; }
    #status.disconnected { color: #f44; }
    #waiting {
      font-size: 24px;
      opacity: 0.4;
      text-align: center;
      margin-top: 50vh;
    }
    #images {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
      padding-top: 40px;
    }
    .image-item {
      width: 100%;
      height: auto;
      object-fit: cover;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }
        #qr-container {
      position: fixed;
      bottom: 16px;
      right: 16px;
      background: rgba(0,0,0,0.8);
      padding: 8px;
      border-radius: 8px;
      z-index: 10;
    }
    #qr-container canvas {
      display: block;
    }

  </style>
</head>
<body>
  <div id="status" class="disconnected">disconnected</div>
  <div id="waiting">Waiting for images...</div>
  <div id="images"></div>
  <div id="qr-container"></div>

  <script>
    const params = new URLSearchParams(location.search);
    const room = params.get("room") || "default";

    // Default to the same host/port as the page (works for local hosting).
    const DEFAULT_SERVER = (location.protocol === "https:" ? "wss:" : "ws:") + "//" + location.host;
    const SERVER = params.get("server") || DEFAULT_SERVER;

    const statusEl = document.getElementById("status");
    const waitingEl = document.getElementById("waiting");
    const imagesEl = document.getElementById("images");
    const qrContainer = document.getElementById("qr-container");

        // Generate QR code for send page
    const sendUrl = `${location.protocol}//${location.host}/send.html?server=${SERVER}&room=${room}`;
    console.log('Generating QR for:', sendUrl);
    try {
      new QRCode(qrContainer, {
        text: sendUrl,
        width: 128,
        height: 128,
        colorDark: "#000000",
        colorLight: "#ffffff",
        correctLevel: QRCode.CorrectLevel.H
      });
      console.log('QR code generated successfully');
    } catch (error) {
      console.error('QR code generation failed:', error);
    }

    function connect() {
      const ws = new WebSocket(`${SERVER}?room=${room}&role=display`);

      ws.onopen = () => {
        statusEl.textContent = `connected (room: ${room})`;
        statusEl.className = "connected";
      };

      ws.onmessage = (e) => {
        try {
          const images = JSON.parse(e.data);
          imagesEl.innerHTML = '';
          images.forEach(imgSrc => {
            const img = document.createElement('img');
            img.src = imgSrc;
            img.className = 'image-item';
            img.alt = 'Received image';
            imagesEl.appendChild(img);
          });
          waitingEl.style.display = images.length ? "none" : "block";
        } catch (err) {
          console.error('Failed to parse images:', err);
        }
      };

      ws.onclose = () => {
        statusEl.textContent = "disconnected — reconnecting...";
        statusEl.className = "disconnected";
        setTimeout(connect, 2000);
      };

      ws.onerror = () => ws.close();
    }

    connect();
  </script>
</body>
</html>
