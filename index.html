<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Display</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      color: #fff;
      font-family: sans-serif;
      height: 100vh;
      overflow: auto;
      padding: 16px;
    }
    #status {
      position: fixed;
      top: 16px;
      left: 16px;
      font-size: 14px;
      opacity: 0.6;
      z-index: 10;
    }
    #status.connected { color: #4f4; }
    #status.disconnected { color: #f44; }
    #waiting {
      font-size: 24px;
      opacity: 0.4;
      text-align: center;
      margin-top: 50vh;
    }
    #images {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
      padding-top: 40px;
    }
    .image-item {
      width: 100%;
      height: auto;
      object-fit: cover;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>
  <div id="status" class="disconnected">disconnected</div>
  <div id="waiting">Waiting for images...</div>
  <div id="images"></div>

  <script>
    const params = new URLSearchParams(location.search);
    const room = params.get("room") || "default";

    // Change this to your tunnel URL, e.g. wss://your-tunnel.ngrok-free.app
    const SERVER = params.get("server") || "wss://utriculate-lilith-isorhythmic.ngrok-free.dev";

    const statusEl = document.getElementById("status");
    const waitingEl = document.getElementById("waiting");
    const imagesEl = document.getElementById("images");

    function connect() {
      const ws = new WebSocket(`${SERVER}?room=${room}&role=display`);

      ws.onopen = () => {
        statusEl.textContent = `connected (room: ${room})`;
        statusEl.className = "connected";
      };

      ws.onmessage = (e) => {
        try {
          const images = JSON.parse(e.data);
          imagesEl.innerHTML = '';
          images.forEach(imgSrc => {
            const img = document.createElement('img');
            img.src = imgSrc;
            img.className = 'image-item';
            img.alt = 'Received image';
            imagesEl.appendChild(img);
          });
          waitingEl.style.display = images.length ? "none" : "block";
        } catch (err) {
          console.error('Failed to parse images:', err);
        }
      };

      ws.onclose = () => {
        statusEl.textContent = "disconnected — reconnecting...";
        statusEl.className = "disconnected";
        setTimeout(connect, 2000);
      };

      ws.onerror = () => ws.close();
    }

    connect();
  </script>
</body>
</html>
