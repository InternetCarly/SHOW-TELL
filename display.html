<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Display</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      color: #fff;
      font-family: sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #status {
      position: fixed;
      top: 16px;
      left: 16px;
      font-size: 14px;
      opacity: 0.6;
    }
    #status.connected { color: #4f4; }
    #status.disconnected { color: #f44; }
    #waiting {
      font-size: 24px;
      opacity: 0.4;
    }
    #image {
      max-width: 100vw;
      max-height: 100vh;
      object-fit: contain;
      display: none;
    }
  </style>
</head>
<body>
  <div id="status" class="disconnected">disconnected</div>
  <div id="waiting">Waiting for images...</div>
  <img id="image" alt="Received image">

  <script>
    const params = new URLSearchParams(location.search);
    const room = params.get("room") || "default";

    // Change this to your tunnel URL, e.g. wss://your-tunnel.ngrok-free.app
    const SERVER = params.get("server") || "wss://hadlee-giggliest-unpopulously.ngrok-free.dev";

    const statusEl = document.getElementById("status");
    const waitingEl = document.getElementById("waiting");
    const imageEl = document.getElementById("image");

    function connect() {
      const ws = new WebSocket(`${SERVER}?room=${room}&role=display`);

      ws.onopen = () => {
        statusEl.textContent = `connected (room: ${room})`;
        statusEl.className = "connected";
      };

      ws.onmessage = (e) => {
        imageEl.src = e.data;
        imageEl.style.display = "block";
        waitingEl.style.display = "none";
      };

      ws.onclose = () => {
        statusEl.textContent = "disconnected — reconnecting...";
        statusEl.className = "disconnected";
        setTimeout(connect, 2000);
      };

      ws.onerror = () => ws.close();
    }

    connect();
  </script>
</body>
</html>
